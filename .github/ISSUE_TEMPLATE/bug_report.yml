name: Bug report
description: Report a bug in vue-composable-observer
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or code to reproduce the issue
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Vue version, plugin version, build tool (Vite/webpack), OS"
    validations:
      required: true
